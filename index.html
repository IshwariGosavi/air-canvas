<!DOCTYPE html>
<html>
<head>
  <title>Air Canvas</title>

  <!-- MediaPipe Hands library -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <style>
    body {
      margin: 0;
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    #videoElement, #canvasElement, #cursorCanvas {
      width: 640px;
      height: 480px;
      border-radius: 12px;
      position: absolute;
      transform: scaleX(-1);
    }

    h1 {
      color: white;
      position: absolute;
      top: 20px;
      margin: 0;
      font-size: 24px;
    }

    #toolbar {
      position: absolute;
      top: 110px;
      z-index: 10;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    #toolbar button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background-color: #4a4a6a;
      color: white;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    #toolbar button:hover {
      background-color: #6a6a8a;
    }

    #toolbar button.active {
      background-color: #4DB8FF;
      color: #1a1a2e;
    }

    #colorSwatches {
      display: grid;
      grid-template-columns: repeat(5, 16px);
      gap: 6px;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .swatch:hover {
      transform: scale(1.2);
    }

    .swatch.active {
      border-color: white;
      transform: scale(1.25);
    }
  </style>
</head>
<body>
  <h1>Air Canvas</h1>

  <div id="toolbar">
    <div id="colorSwatches">
      <div class="swatch active" data-color="#4DB8FF" style="background-color:#4DB8FF;"></div>
      <div class="swatch" data-color="#0057FF" style="background-color:#0057FF;"></div>
      <div class="swatch" data-color="#FF4D6A" style="background-color:#FF4D6A;"></div>
      <div class="swatch" data-color="#FF0000" style="background-color:#FF0000;"></div>
      <div class="swatch" data-color="#4DFF88" style="background-color:#4DFF88;"></div>
      <div class="swatch" data-color="#00A86B" style="background-color:#00A86B;"></div>
      <div class="swatch" data-color="#FFD24D" style="background-color:#FFD24D;"></div>
      <div class="swatch" data-color="#FFFF00" style="background-color:#FFFF00;"></div>
      <div class="swatch" data-color="#B84DFF" style="background-color:#B84DFF;"></div>
      <div class="swatch" data-color="#6A0DAD" style="background-color:#6A0DAD;"></div>
      <div class="swatch" data-color="#FF914D" style="background-color:#FF914D;"></div>
      <div class="swatch" data-color="#4DFFF0" style="background-color:#4DFFF0;"></div>
      <div class="swatch" data-color="#FF4DE1" style="background-color:#FF4DE1;"></div>
      <div class="swatch" data-color="#A0FF4D" style="background-color:#A0FF4D;"></div>
      <div class="swatch" data-color="#8C6E4D" style="background-color:#8C6E4D;"></div>
      <div class="swatch" data-color="#000000" style="background-color:#000000;"></div>
      <div class="swatch" data-color="#FFFFFF" style="background-color:#FFFFFF;"></div>
      <div class="swatch" data-color="#7A7A7A" style="background-color:#7A7A7A;"></div>
      <div class="swatch" data-color="#4B0082" style="background-color:#4B0082;"></div>
      <div class="swatch" data-color="#FFC9A3" style="background-color:#FFC9A3;"></div>
    </div>
    <button id="eraserBtn">🧹 Eraser</button>
    <button id="clearBtn">🗑️ Clear</button>
  </div>

  <video id="videoElement" autoplay></video>
  <canvas id="canvasElement" width="640" height="480"></canvas>
  <canvas id="cursorCanvas" width="640" height="480"></canvas>

  <script>
    const video = document.getElementById('videoElement');
    const canvasElement = document.getElementById('canvasElement');
    const canvasCtx = canvasElement.getContext('2d');
    const cursorCanvas = document.getElementById('cursorCanvas');
    const cursorCtx = cursorCanvas.getContext('2d');

    const hands = new Hands({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    let prevX = null;
    let prevY = null;
    let currentColor = '#4DB8FF';
    let isErasing = false;

    hands.onResults((results) => {
      cursorCtx.clearRect(0, 0, cursorCanvas.width, cursorCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        const indexFingertip = landmarks[8];
        const thumbTip = landmarks[4];

        const x = indexFingertip.x * canvasElement.width;
        const y = indexFingertip.y * canvasElement.height;

        const thumbX = thumbTip.x * canvasElement.width;
        const thumbY = thumbTip.y * canvasElement.height;
        const distance = Math.sqrt((x - thumbX) ** 2 + (y - thumbY) ** 2);

        const isPinching = distance < 40;

        if (!isPinching) {
          if (prevX !== null && prevY !== null) {
            canvasCtx.beginPath();
            canvasCtx.moveTo(prevX, prevY);
            canvasCtx.lineTo(x, y);

            if (isErasing) {
              canvasCtx.globalCompositeOperation = 'destination-out';
              canvasCtx.lineWidth = 30;
            } else {
              canvasCtx.globalCompositeOperation = 'source-over';
              canvasCtx.strokeStyle = currentColor;
              canvasCtx.lineWidth = 4;
            }
            canvasCtx.lineCap = 'round';
            canvasCtx.stroke();
          }
          prevX = x;
          prevY = y;

          cursorCtx.beginPath();
          cursorCtx.arc(x, y, 8, 0, 2 * Math.PI);
          cursorCtx.fillStyle = isErasing ? 'white' : currentColor;
          cursorCtx.fill();
        } else {
          prevX = null;
          prevY = null;

          cursorCtx.beginPath();
          cursorCtx.arc(x, y, 8, 0, 2 * Math.PI);
          cursorCtx.fillStyle = 'orange';
          cursorCtx.fill();
        }
      } else {
        prevX = null;
        prevY = null;
      }
    });

    navigator.mediaDevices.getUserMedia({ video: true })
      .then((stream) => {
        video.srcObject = stream;

        const camera = new Camera(video, {
          onFrame: async () => {
            await hands.send({ image: video });
          },
          width: 640,
          height: 480
        });

        camera.start();
      })
      .catch((err) => {
        console.error('Webcam access error:', err);
        alert('Could not access webcam. Please allow camera permission and refresh.');
      });

    const swatches = document.querySelectorAll('.swatch');
    swatches.forEach((swatch) => {
      swatch.addEventListener('click', () => {
        currentColor = swatch.getAttribute('data-color');
        isErasing = false;
        eraserBtn.classList.remove('active');

        swatches.forEach((s) => s.classList.remove('active'));
        swatch.classList.add('active');
      });
    });

    const eraserBtn = document.getElementById('eraserBtn');
    eraserBtn.addEventListener('click', () => {
      isErasing = !isErasing;
      eraserBtn.classList.toggle('active', isErasing);
    });

    const clearBtn = document.getElementById('clearBtn');
    clearBtn.addEventListener('click', () => {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    });
  </script>
</body>
</html>
